name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          DIFF=$(git diff origin/${{ github.base_ref }}...HEAD -- '*.tsx' '*.ts' '*.css' '*.yml' '*.json' | head -c 30000)
          echo "diff<<DIFF_EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "DIFF_EOF" >> $GITHUB_OUTPUT

      - name: Changed files
        id: files
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*.tsx' '*.ts' '*.css' '*.yml' '*.json')
          echo "files<<FILES_EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "FILES_EOF" >> $GITHUB_OUTPUT

      - name: AI Review
        uses: actions/github-script@v7
        env:
          DIFF: ${{ steps.diff.outputs.diff }}
          FILES: ${{ steps.files.outputs.files }}
        with:
          script: |
            const diff = process.env.DIFF || '';
            const files = process.env.FILES || '';
            const apiKey = process.env.REVIEW_API_KEY;

            if (!apiKey) {
              core.info('No API key, posting skip notice');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: '## 🤖 AI Code Review\n\n> ⚠️ Skipped — add `REVIEW_API_KEY` secret to enable.'
              });
              return;
            }

            if (!diff || diff.trim().length === 0) {
              core.info('No code changes to review');
              return;
            }

            const prompt = [
              'You are a senior software architect reviewing a pull request for proppd.com,',
              'a South African property portal built with Next.js, Supabase, and PostgreSQL.',
              '',
              'Changed files:',
              files,
              '',
              'Review the diff and provide feedback. Focus ONLY on:',
              '',
              '1. Security: SQL injection, XSS, auth bypass, data exposure, API key leaks',
              '2. Business Logic: Broken data flows, incorrect calculations, missing edge cases',
              '3. Performance: N+1 queries, missing indexes, unnecessary re-renders',
              '4. Data Integrity: Missing validation, type mismatches, race conditions',
              '5. Production Risks: Unhandled errors that crash the app, missing fallbacks',
              '',
              'IGNORE: formatting, naming, style preferences, unused imports.',
              '',
              'For each issue: Severity (CRITICAL/WARNING/INFO), file, what is wrong, how to fix.',
              'If no issues: say "No critical issues detected."',
              '',
              'DIFF:',
              diff,
            ].join('\n');

            const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${apiKey}`,
                'Content-Type': 'application/json',
                'HTTP-Referer': 'https://proppd.com',
                'X-Title': 'Proppd AI Code Review',
              },
              body: JSON.stringify({
                model: 'google/gemini-2.0-flash-001',
                messages: [{ role: 'user', content: prompt }],
                max_tokens: 2000,
                temperature: 0.1,
              }),
            });

            if (!response.ok) {
              core.warning(`AI review API error: ${response.status}`);
              return;
            }

            const data = await response.json();
            const review = data.choices?.[0]?.message?.content || 'No review generated';

            const reviewBody = review.split('---')[0] || review;
            const criticalCount = (reviewBody.match(/CRITICAL/gi) || []).length;
            const warningCount = (reviewBody.match(/WARNING/gi) || []).length;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '## 🤖 AI Code Review',
                '',
                review,
                '',
                '---',
                '<details><summary>Review stats</summary>',
                '',
                `- Critical: ${criticalCount}`,
                `- Warnings: ${warningCount}`,
                `- Model: gemini-2.0-flash via OpenRouter (free)`,
                '</details>',
                '',
                '> Auto-generated. Focus on architecture and security, not style.',
              ].join('\n'),
            });

            if (criticalCount > 0) {
              core.setFailed(`❌ ${criticalCount} critical issue(s) found.`);
            } else {
              core.info(`✅ Review passed (${warningCount} warnings)`);
            }
