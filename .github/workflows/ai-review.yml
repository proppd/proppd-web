name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          DIFF=$(git diff origin/${{ github.base_ref }}...HEAD -- '*.tsx' '*.ts' '*.css' | head -c 30000)
          echo "diff<<DIFF_EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "DIFF_EOF" >> $GITHUB_OUTPUT

      - name: AI Review
        id: review
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DIFF: ${{ steps.diff.outputs.diff }}
        with:
          script: |
            const diff = process.env.DIFF;
            if (!diff || diff.trim().length === 0) {
              core.info('No code changes to review');
              return;
            }

            const prompt = `You are a senior software architect reviewing a pull request for proppd.com, a South African property portal built with Next.js, Supabase, and PostgreSQL.

Review the following diff and provide feedback. Focus ONLY on:

1. **Security**: SQL injection, XSS, auth bypass, data exposure, API key leaks
2. **Business Logic**: Broken data flows, incorrect calculations, missing edge cases
3. **Performance**: N+1 queries, missing indexes, unnecessary re-renders, memory leaks
4. **Data Integrity**: Missing validation, type mismatches, race conditions
5. **Production Risks**: Unhandled errors that crash the app, missing fallbacks

IGNORE: formatting, naming conventions, style preferences, unused imports (unless security risk).

For each issue found, provide:
- Severity: CRITICAL | WARNING | INFO
- File and line (if identifiable)
- What's wrong
- How to fix it

If no issues found, say "No critical issues detected."

DIFF:
${diff}`;

            const response = await fetch('https://api.openai.com/v1/chat/completions', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${process.env.OPENAI_API_KEY}`,
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({
                model: 'gpt-4o-mini',
                messages: [{ role: 'user', content: prompt }],
                max_tokens: 2000,
                temperature: 0.1,
              }),
            });

            if (!response.ok) {
              const err = await response.text();
              core.warning(`AI review failed: ${response.status} ${err}`);
              return;
            }

            const data = await response.json();
            const review = data.choices?.[0]?.message?.content || 'No review generated';

            // Count critical issues
            const criticalCount = (review.match(/CRITICAL/gi) || []).length;
            const warningCount = (review.match(/WARNING/gi) || []).length;

            // Post review comment
            const body = `## 🤖 AI Code Review

${review}

---
<details>
<summary>Review stats</summary>

- Critical issues: ${criticalCount}
- Warnings: ${warningCount}
- Model: gpt-4o-mini
</details>

> Auto-generated review. Focus on architecture and security, not style.`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

            // Fail if critical issues found
            if (criticalCount > 0) {
              core.setFailed(`❌ ${criticalCount} critical issue(s) found. Please fix before merging.`);
            } else {
              core.info(`✅ Review passed (${warningCount} warnings)`);
            }
